---
# ==============================================================================
# DEPLOY KUMA DATA PLANE PROXY ON VM (UNIVERSAL MODE)
# ==============================================================================

- name: Kuma VM | Clean up any existing transparent proxy rules from previous runs
  ansible.builtin.command: /usr/local/bin/kumactl uninstall transparent-proxy
  failed_when: false
  tags:
    - kuma_vm

- name: Kuma VM | Update Apt Cache (Debian)
  ansible.builtin.apt:
    update_cache: true
  ignore_errors: true
  when: ansible_os_family == "Debian"
  tags:
    - kuma_vm


- name: Kuma VM | Install Prerequisites (Debian)
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - iptables
      - iproute2
    state: present
  when: ansible_os_family == "Debian"
  tags:
    - kuma_vm

- name: Kuma VM | Install Prerequisites (RedHat)
  ansible.builtin.dnf:
    name:
      - curl
      - wget
      - iptables
      - iproute
    state: present
  when: ansible_os_family == "RedHat"
  tags:
    - kuma_vm

- name: Kuma VM | Install Nginx Application Runtime (Debian)
  ansible.builtin.apt:
    name: nginx
    state: present
  when: ansible_os_family == "Debian"
  tags:
    - kuma_vm

- name: Kuma VM | Install Nginx Application Runtime (RedHat)
  ansible.builtin.dnf:
    name: nginx
    state: present
  when: ansible_os_family == "RedHat"
  tags:
    - kuma_vm

- name: Kuma VM | Create kuma-dp system group
  ansible.builtin.group:
    name: kuma-dp
    state: present
  tags:
    - kuma_vm

- name: Kuma VM | Create kuma-dp system user
  ansible.builtin.user:
    name: kuma-dp
    group: kuma-dp
    shell: /usr/sbin/nologin
    system: true
    state: present
  tags:
    - kuma_vm

- name: Kuma VM | Check if kuma-dp binary exists
  ansible.builtin.stat:
    path: /usr/local/bin/kuma-dp
  register: kuma_dp_stat
  tags:
    - kuma_vm

- name: Kuma VM | Check if envoy binary exists
  ansible.builtin.stat:
    path: /usr/local/bin/envoy
  register: envoy_stat
  tags:
    - kuma_vm

- name: Kuma VM | Check if coredns binary exists
  ansible.builtin.stat:
    path: /usr/local/bin/coredns
  register: coredns_stat
  tags:
    - kuma_vm

- name: Kuma VM | Temporarily disable transparent proxy to allow downloads if binaries are missing
  ansible.builtin.command: /usr/local/bin/kumactl uninstall transparent-proxy
  failed_when: false
  when: not kuma_dp_stat.stat.exists or not envoy_stat.stat.exists or not coredns_stat.stat.exists
  tags:
    - kuma_vm

- name: Kuma VM | Download and extract Kuma binaries via installer script
  ansible.builtin.shell: |
    set -o pipefail
    curl -L https://kuma.io/installer.sh | VERSION={{ kuma_version }} sh -
  args:
    chdir: /tmp
    executable: /bin/bash
  when: not kuma_dp_stat.stat.exists or not envoy_stat.stat.exists or not coredns_stat.stat.exists
  changed_when: true
  tags:
    - kuma_vm

- name: Kuma VM | Install kuma-dp, kumactl, coredns, and envoy binaries
  ansible.builtin.copy:
    src: "/tmp/kuma-{{ kuma_version }}/bin/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    mode: "0755"
    remote_src: true
  loop:
    - kuma-dp
    - kumactl
    - coredns
    - envoy
  when: not kuma_dp_stat.stat.exists or not envoy_stat.stat.exists or not coredns_stat.stat.exists
  tags:
    - kuma_vm

# --------------------------------------------------------------------------
# Dynamic Credential & Certificate Generation
# --------------------------------------------------------------------------

- name: Kuma VM | Extract Kuma Control Plane CA Certificate
  ansible.builtin.shell: >
    kubectl get secret kuma-tls-cert -n kuma-system -o jsonpath='{.data.ca\.crt}'
  register: kuma_ca_raw
  delegate_to: "{{ groups['control_plane'][0] }}"
  run_once: true
  changed_when: false
  failed_when: false
  tags:
    - kuma_vm

- name: Kuma VM | Fallback to tls.crt if ca.crt is not in secret
  ansible.builtin.shell: >
    kubectl get secret kuma-tls-cert -n kuma-system -o jsonpath='{.data.tls\.crt}'
  register: kuma_tls_raw
  delegate_to: "{{ groups['control_plane'][0] }}"
  run_once: true
  changed_when: false
  when: kuma_ca_raw.stdout == ""
  tags:
    - kuma_vm

- name: Kuma VM | Set CA Cert Fact
  ansible.builtin.set_fact:
    kuma_ca_pem: "{{ (kuma_ca_raw.stdout | b64decode) if kuma_ca_raw.stdout != '' else (kuma_tls_raw.stdout | b64decode) }}"
  tags:
    - kuma_vm

- name: Kuma VM | Extract Admin User Token
  ansible.builtin.shell: >
    kubectl get secret admin-user-token -n kuma-system -o jsonpath='{.data.value}' | base64 -d
  register: kuma_admin_token
  delegate_to: "{{ groups['control_plane'][0] }}"
  run_once: true
  changed_when: false
  tags:
    - kuma_vm

- name: Kuma VM | Get Kuma Control Plane Cluster IP
  ansible.builtin.shell: >
    kubectl get svc -n kuma-system kuma-control-plane -o jsonpath='{.spec.clusterIP}'
  register: kuma_cp_cluster_ip
  delegate_to: "{{ groups['control_plane'][0] }}"
  run_once: true
  changed_when: false
  tags:
    - kuma_vm

- name: Kuma VM | Configure kumactl on Control Plane
  ansible.builtin.command: >
    /usr/local/bin/kumactl config control-planes add
    --name k8s-mesh
    --address http://{{ kuma_cp_cluster_ip.stdout }}:5681
    --auth-type=tokens
    --auth-conf token={{ kuma_admin_token.stdout }}
    --overwrite
  delegate_to: "{{ groups['control_plane'][0] }}"
  run_once: true
  changed_when: true
  tags:
    - kuma_vm

- name: Kuma VM | Generate Kuma Dataplane Token on Control Plane
  ansible.builtin.command: >
    /usr/local/bin/kumactl generate dataplane-token
    --name {{ inventory_hostname }}.{{ vm_namespace }}
    --mesh {{ kuma_mesh }}
    --valid-for 87600h
  register: kuma_token_raw
  delegate_to: "{{ groups['control_plane'][0] }}"
  changed_when: false
  tags:
    - kuma_vm

# --------------------------------------------------------------------------
# Create Directories & Deploy Credentials
# --------------------------------------------------------------------------

- name: Kuma VM | Create Kuma config directory
  ansible.builtin.file:
    path: /etc/kuma
    state: directory
    owner: kuma-dp
    group: kuma-dp
    mode: '0755'
  tags:
    - kuma_vm

- name: Kuma VM | Create Kuma state directory
  ansible.builtin.file:
    path: /var/lib/kuma
    state: directory
    owner: kuma-dp
    group: kuma-dp
    mode: '0700'
  tags:
    - kuma_vm

- name: Kuma VM | Deploy Kuma Control Plane CA Certificate
  ansible.builtin.copy:
    content: "{{ kuma_ca_pem }}"
    dest: /etc/kuma/kuma-ca.crt
    owner: kuma-dp
    group: kuma-dp
    mode: '0644'
  register: kuma_ca_cert_copy
  tags:
    - kuma_vm

- name: Kuma VM | Deploy Kuma Dataplane Token
  ansible.builtin.copy:
    content: "{{ kuma_token_raw.stdout }}"
    dest: /etc/kuma/kuma-dp-token
    owner: kuma-dp
    group: kuma-dp
    mode: '0600'
  register: kuma_token_copy
  tags:
    - kuma_vm

# --------------------------------------------------------------------------
# Template Configurations
# --------------------------------------------------------------------------

- name: Kuma VM | Add control plane host entry to /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    line: "{{ hostvars[groups['control_plane'][0]]['ansible_host'] }} kuma-control-plane.kuma-system.svc kuma-control-plane.kuma-system.svc.cluster.local"
    state: present
  tags:
    - kuma_vm

- name: Kuma VM | Template Dataplane Configuration
  ansible.builtin.template:
    src: dp.yaml.j2
    dest: /etc/kuma/dp.yaml
    owner: kuma-dp
    group: kuma-dp
    mode: '0644'
  register: kuma_dp_config
  tags:
    - kuma_vm

- name: Kuma VM | Template systemd service
  ansible.builtin.template:
    src: kuma-dp.service.j2
    dest: /etc/systemd/system/kuma-dp.service
    owner: root
    group: root
    mode: '0644'
  register: kuma_service_template
  tags:
    - kuma_vm

# --------------------------------------------------------------------------
# Transparent Proxy Configuration & Start Services
# --------------------------------------------------------------------------

- name: Kuma VM | Enable and Start Nginx
  ansible.builtin.systemd:
    name: nginx
    enabled: true
    state: started
  tags:
    - kuma_vm

- name: Kuma VM | Enable and Start Kuma DP Proxy
  ansible.builtin.systemd:
    name: kuma-dp
    enabled: true
    state: started
    daemon_reload: true
  tags:
    - kuma_vm

- name: Kuma VM | Restart Kuma DP if configuration changed
  ansible.builtin.systemd:
    name: kuma-dp
    state: restarted
  when: >
    kuma_ca_cert_copy.changed or
    kuma_token_copy.changed or
    kuma_dp_config.changed or
    kuma_service_template.changed
  tags:
    - kuma_vm

- name: Kuma VM | Configure Transparent Proxy Rules
  ansible.builtin.command: >
    /usr/local/bin/kumactl install transparent-proxy
    --kuma-dp-user kuma-dp
    --exclude-inbound-ports 22
    --exclude-outbound-ports 22
    --redirect-dns
  async: 60
  poll: 0
  changed_when: true
  tags:
    - kuma_vm


