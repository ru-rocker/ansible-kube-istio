---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: mesh-services
  labels:
    app: order-service
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
        version: v1
    spec:
      containers:
      - name: order-service
        image: nginx:1.27-alpine
        ports:
        - containerPort: 80
          name: http
        volumeMounts:
        - name: config
          mountPath: /etc/nginx/conf.d
      volumes:
      - name: config
        configMap:
          name: order-service-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: order-service-config
  namespace: mesh-services
data:
  default.conf: |
    server {
      listen 80;
      server_name _;

      location / {
        return 200 '{"service":"order-service","status":"ok"}';
        add_header Content-Type application/json;
      }

      # Calls payment-service through ztunnel (mTLS automatic)
      location /pay {
        resolver 10.96.0.10 valid=5s;
        set $upstream_endpoint http://payment-service.mesh-services.svc.cluster.local/process;
        proxy_pass $upstream_endpoint;
        proxy_set_header Host payment-service.mesh-services.svc.cluster.local;
      }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: mesh-services
  labels:
    app: order-service
spec:
  selector:
    app: order-service
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP