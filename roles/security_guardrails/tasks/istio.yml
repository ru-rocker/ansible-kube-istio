---
- name: Security Guardrails | Enforce Strict Mutual TLS (mTLS) Global Policy
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: security.istio.io/v1beta1
      kind: PeerAuthentication
      metadata:
        name: default-mtls
        namespace: istio-system
      spec:
        mtls:
          mode: STRICT
  when:
    - inventory_hostname in groups['control_plane']
    - enforce_strict_mtls | bool
  tags:
    - security
    - guardrails

- name: Security Guardrails | Deploy Global Default-Deny AuthorizationPolicy
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: security.istio.io/v1beta1
      kind: AuthorizationPolicy
      metadata:
        name: global-default-deny
        namespace: istio-system
      spec:
        {} # Empty spec denotes default-deny for all traffic in mesh
  when:
    - inventory_hostname in groups['control_plane']
    - enable_default_deny | bool
  tags:
    - security
    - guardrails

- name: Security Guardrails | Enable Istio Sidecar Injection on Target Namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ vm_namespace }}"
        labels:
          istio-injection: enabled
  when: inventory_hostname in groups['control_plane']
  tags:
    - security
    - guardrails

- name: Security Guardrails | Create VM Proxy ServiceAccount
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: "{{ vm_service_account_name }}"
        namespace: "{{ vm_namespace }}"
  when: inventory_hostname in groups['control_plane']
  tags:
    - security
    - guardrails

- name: Security Guardrails | Create VM Proxy WorkloadGroup
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: networking.istio.io/v1
      kind: WorkloadGroup
      metadata:
        name: "{{ vm_auto_register_group }}"
        namespace: "{{ vm_namespace }}"
      spec:
        metadata:
          labels:
            app: vm-proxy
            version: v1
          annotations:
            traffic.sidecar.istio.io/includeInboundPorts: "{{ vm_inbound_ports }}"
            traffic.sidecar.istio.io/excludeInboundPorts: "22"
        template:
          serviceAccount: "{{ vm_service_account_name }}"
          network: "{{ vm_network }}"
          ports:
            http: "{{ vm_inbound_ports | int }}"
  when: inventory_hostname in groups['control_plane']
  tags:
    - security
    - guardrails

- name: Security Guardrails | Enforce Strict mTLS for Argo CD Namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: security.istio.io/v1beta1
      kind: PeerAuthentication
      metadata:
        name: argocd-strict-mtls
        namespace: "{{ argo_namespace }}"
      spec:
        mtls:
          mode: STRICT
  when:
    - inventory_hostname in groups['control_plane']
    - enforce_strict_mtls | bool
    - argo_enabled | bool
  tags:
    - security
    - guardrails
    - argo

- name: Security Guardrails | Enforce Strict mTLS for Argo Rollouts Namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: security.istio.io/v1beta1
      kind: PeerAuthentication
      metadata:
        name: argo-rollouts-strict-mtls
        namespace: "{{ argo_rollouts_namespace }}"
      spec:
        mtls:
          mode: STRICT
  when:
    - inventory_hostname in groups['control_plane']
    - enforce_strict_mtls | bool
    - argo_enabled | bool
  tags:
    - security
    - guardrails
    - argo

- name: Security Guardrails | Allow Intra-Namespace Traffic for Argo CD
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: security.istio.io/v1beta1
      kind: AuthorizationPolicy
      metadata:
        name: argocd-allow-intra-namespace
        namespace: "{{ argo_namespace }}"
      spec:
        action: ALLOW
        rules:
          - from:
              - source:
                  namespaces: ["{{ argo_namespace }}"]
  when:
    - inventory_hostname in groups['control_plane']
    - enable_default_deny | bool
    - argo_enabled | bool
  tags:
    - security
    - guardrails
    - argo

- name: Security Guardrails | Allow Gateway Ingress Traffic to Argo CD Server
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: security.istio.io/v1beta1
      kind: AuthorizationPolicy
      metadata:
        name: argocd-allow-ingress-to-server
        namespace: "{{ argo_namespace }}"
      spec:
        selector:
          matchLabels:
            app.kubernetes.io/name: argocd-server
        action: ALLOW
        rules:
          - from:
              - source:
                  namespaces: ["istio-system"]
  when:
    - inventory_hostname in groups['control_plane']
    - enable_default_deny | bool
    - argo_enabled | bool
  tags:
    - security
    - guardrails
    - argo

- name: Security Guardrails | Allow Intra-Namespace Traffic for Argo Rollouts
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: security.istio.io/v1beta1
      kind: AuthorizationPolicy
      metadata:
        name: argo-rollouts-allow-intra-namespace
        namespace: "{{ argo_rollouts_namespace }}"
      spec:
        action: ALLOW
        rules:
          - from:
              - source:
                  namespaces: ["{{ argo_rollouts_namespace }}"]
  when:
    - inventory_hostname in groups['control_plane']
    - enable_default_deny | bool
    - argo_enabled | bool
  tags:
    - security
    - guardrails
    - argo

- name: Security Guardrails | Verify Global Policies Status
  ansible.builtin.command: kubectl get peerauthentications,authorizationpolicies -n istio-system
  register: security_policies_status
  changed_when: false
  when: inventory_hostname in groups['control_plane']
  tags:
    - security
    - guardrails

- name: Security Guardrails | Log Security Status
  ansible.builtin.debug:
    msg: "Active Security Policies:\n{{ security_policies_status.stdout }}"
  when:
    - inventory_hostname in groups['control_plane']
    - security_policies_status.stdout is defined
  tags:
    - security
    - guardrails
