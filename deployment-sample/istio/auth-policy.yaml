apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: payment-service-policy
  namespace: mesh-services
spec:
  selector:
    matchLabels:
      app: payment-service
  action: ALLOW
  rules:
  - from:
    - source:
        principals:
        - "cluster.local/ns/mesh-services/sa/default"
    to:
    - operation:
        ports: ["80"]
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: order-service-policy
  namespace: mesh-services
spec:
  selector:
    matchLabels:
      app: order-service
  action: ALLOW
  rules:
  - from:
    - source:
        principals:
        - "cluster.local/ns/mesh-services/sa/default"
        - "cluster.local/ns/mesh-services/sa/vm-proxy-sa"
        - "cluster.local/ns/meshz-services/sa/default"
    to:
    - operation:
        ports: ["80"]
---
# Note: Since the VM connects to the control plane through a NAT gateway,
# istiod cannot resolve workload labels (like app: vm-proxy) on its connection.
# Therefore, we omit the selector field so that this ALLOW policy applies
# to all workloads in the namespace, including the VM proxy.
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: vm-proxy-policy
  namespace: mesh-services
spec:
  action: ALLOW
  rules:
  - from:
    - source:
        principals:
        - "cluster.local/ns/mesh-services/sa/default"
    to:
    - operation:
        ports: ["80"]