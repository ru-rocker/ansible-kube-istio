---
# System Guardrail Thresholds
min_ram_mb: 900
min_cpu_cores: 1
min_disk_gb: 10
disable_swap_automatically: true

# Service Mesh Type Configuration (istio or kuma)
mesh_type: "kuma"

# Kubernetes Configuration
kubernetes_minor_version: "v1.31"
kubernetes_version: "1.31.0"
pod_network_cidr: "10.244.0.0/16"
control_plane_endpoint: "{{ hostvars[groups['control_plane'][0]]['ansible_host'] }}:6443"

# Istio Configuration
istio_version: "1.29.4"
istio_profile: "default"
enforce_strict_mtls: true
enable_default_deny: true
istio_cni_enabled: true

# VM Sidecar Proxy Configuration
vm_service_account_name: "vm-proxy-sa"
vm_namespace: "mesh-services"
vm_canonical_service: "nginx-vm-proxy"
vm_service_cidr: "*"
vm_network: "vm-network"
vm_inbound_ports: "80"
vm_auto_register_group: "vm-proxy-group"
vm_dns_capture: true
vm_dns_auto_allocate: true
vm_bootstrap_port: 30185

# Kuma Configuration
kuma_version: "2.14.0"
kuma_mesh: "default"
kuma_vm_bootstrap_port: 30578

# Kuma VM Sidecar Proxy Configuration
kuma_vm_service_name: "nginx-vm-kuma"
kuma_vm_inbound_port: 80
kuma_vm_service_port: 80

# Argo CD & Rollouts Configuration
argo_enabled: true
argo_namespace: "argocd"
argo_rollouts_namespace: "argo-rollouts"
argo_cd_version: "7.1.3"
argo_rollouts_version: "2.37.2"
argo_cd_server_host: "argocd.example.com"
