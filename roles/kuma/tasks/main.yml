---
# ==============================================================================
# INSTALL KUMA SERVICE MESH CONTROL PLANE
# ==============================================================================

- name: Kuma | Install Python Dependencies (Apt)
  ansible.builtin.apt:
    name:
      - python3-kubernetes
      - python3-yaml
    state: present
    update_cache: true
  when: inventory_hostname in groups['control_plane']
  tags:
    - kuma
    - kuma-python

- name: Kuma | Download Helm Installer
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
    dest: /tmp/get_helm.sh
    mode: "0755"
  when: inventory_hostname in groups['control_plane']
  tags:
    - kuma

- name: Kuma | Install Helm
  ansible.builtin.command: /tmp/get_helm.sh
  args:
    creates: /usr/local/bin/helm
  when: inventory_hostname in groups['control_plane']
  tags:
    - kuma

- name: Kuma | Add Kuma Helm Repository
  kubernetes.core.helm_repository:
    name: kuma
    repo_url: https://kumahq.github.io/charts
  environment:
    KUBECONFIG: /root/.kube/config
  when: inventory_hostname in groups['control_plane']
  tags:
    - kuma

- name: Kuma | Update Helm Repositories
  ansible.builtin.command: helm repo update
  changed_when: false
  environment:
    KUBECONFIG: /root/.kube/config
  when: inventory_hostname in groups['control_plane']
  tags:
    - kuma

- name: Kuma | Install Kuma Control Plane
  kubernetes.core.helm:
    name: kuma
    chart_ref: kuma/kuma
    chart_version: "{{ kuma_version }}"
    release_namespace: kuma-system
    create_namespace: true
    values:
      controlPlane:
        envVars:
          KUMA_BOOTSTRAP_SERVER_PARAMS_XDS_PORT: "{{ kuma_vm_bootstrap_port }}"
          KUMA_DP_SERVER_AUTHN_DP_PROXY_TYPE: "none"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1024Mi
    wait: true
  environment:
    KUBECONFIG: /root/.kube/config
  when: inventory_hostname in groups['control_plane']
  tags:
    - kuma

- name: Kuma | Check if kumactl exists on host
  ansible.builtin.stat:
    path: /usr/local/bin/kumactl
  register: host_kumactl_stat
  when: inventory_hostname in groups['control_plane']
  tags:
    - kuma

- name: Kuma | Download and extract Kuma binaries on host
  ansible.builtin.shell: |
    set -o pipefail
    curl -L https://kuma.io/installer.sh | VERSION={{ kuma_version }} sh -
  args:
    chdir: /tmp
    executable: /bin/bash
  when:
    - inventory_hostname in groups['control_plane']
    - not host_kumactl_stat.stat.exists
  changed_when: true
  tags:
    - kuma

- name: Kuma | Install kumactl on host
  ansible.builtin.copy:
    src: "/tmp/kuma-{{ kuma_version }}/bin/kumactl"
    dest: /usr/local/bin/kumactl
    mode: "0755"
    remote_src: true
  when:
    - inventory_hostname in groups['control_plane']
    - not host_kumactl_stat.stat.exists
  tags:
    - kuma

- name: Kuma | Expose Control Plane Service via NodePort
  kubernetes.core.k8s:
    state: patched
    kind: Service
    name: kuma-control-plane
    namespace: kuma-system
    definition:
      spec:
        type: NodePort
        ports:
          - name: dp-server
            port: 5678
            targetPort: 5678
          - name: dp-server-nodeport
            port: "{{ kuma_vm_bootstrap_port | int }}"
            targetPort: 5678
            nodePort: "{{ kuma_vm_bootstrap_port | int }}"
  environment:
    KUBECONFIG: /root/.kube/config
  when: inventory_hostname in groups['control_plane']
  tags:
    - kuma



