apiVersion: networking.istio.io/v1
kind: WorkloadGroup
metadata:
  name: vm-proxy-group
  namespace: mesh-services
spec:
  metadata:
    labels:
      app: vm-proxy
      version: v1
    annotations:
      # The Istio VM sidecar is application-agnostic. This tells it which
      # inbound application port to intercept and protect with mesh mTLS.
      # Use "80" for Nginx, "8080" for JBoss/WildFly, or your app port.
      traffic.sidecar.istio.io/includeInboundPorts: "80"
      # Never intercept SSH. Add monitoring/admin ports here if needed.
      traffic.sidecar.istio.io/excludeInboundPorts: "22"
  template:
    serviceAccount: vm-proxy-sa
    network: vm-network
    ports:
      http: 80
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vm-proxy-sa
  namespace: mesh-services